name: Spreadsheet

on:
  push:
    branches: [main]
    paths:
      - 'spreadsheet/**'
  pull_request:
    paths:
      - 'spreadsheet/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spreadsheet
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: spreadsheet/package.json
          cache: npm
          cache-dependency-path: spreadsheet/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
